<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celebrate Your Name 🎉</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#ff4e50,#fc913a,#f9d423,#6dd5ed,#6a11cb);
    background-size:500% 500%;
    animation:bg 12s ease infinite;
    display:flex;
    justify-content:center;
    align-items:center;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
    width:90%;
    max-width:700px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:35px;
    text-align:center;
    color:#fff;
    box-shadow:0 0 40px rgba(0,0,0,.25);
    z-index:10;
}

h1{
    font-size:2.6rem;
    margin-bottom:15px;
}

p{
    opacity:.9;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:50px;
    font-size:18px;
    outline:none;
    text-align:center;
}

button{
    margin-top:18px;
    padding:14px 40px;
    border:none;
    border-radius:50px;
    background:#fff;
    color:#ff2f6e;
    cursor:pointer;
    font-size:18px;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

#celebration{
    display:none;
}

.bigName{
    position:absolute;
    color:white;
    font-size:40px;
    font-weight:bold;
    pointer-events:none;
    animation:floatUp 8s linear forwards;
    text-shadow:0 0 20px white,
               0 0 40px yellow,
               0 0 60px hotpink;
}

@keyframes floatUp{
0%{
transform:translateY(100vh) scale(.5) rotate(0deg);
opacity:0;
}
15%{
opacity:1;
}
100%{
transform:translateY(-120vh) scale(1.5) rotate(360deg);
opacity:0;
}
}

.balloon{
    position:absolute;
    bottom:-120px;
    width:70px;
    animation:balloonMove linear forwards;
}

.balloon::before{
content:"";
display:block;
width:70px;
height:90px;
background:var(--color);
border-radius:50%;
}

.balloon::after{
content:"";
position:absolute;
width:2px;
height:80px;
background:#fff;
left:34px;
top:90px;
}

@keyframes balloonMove{
to{
transform:translateY(-130vh);
}
}

.confetti{
position:absolute;
width:10px;
height:10px;
animation:confetti 5s linear forwards;
}

@keyframes confetti{
0%{
transform:translateY(-20px) rotate(0);
}
100%{
transform:translateY(110vh) rotate(1000deg);
}
}

.footer{
margin-top:20px;
font-size:15px;
opacity:.8;
}

@media(max-width:600px){

h1{
font-size:2rem;
}

.bigName{
font-size:26px;
}

.container{
padding:25px;
}

}
</style>

</head>
<body>

<div class="container">

<div id="formSection">
<h1>🎉 Celebration Website 🎉</h1>

<p>Enter any name and celebrate with balloons, confetti, and glowing animations!</p>

<input type="text" id="name" placeholder="Enter a Name">

<button onclick="celebrate()">Celebrate 🎊</button>

<div class="footer">
Made with ❤️ using HTML, CSS & JavaScript
</div>

</div>

<div id="celebration">
<h1 id="mainTitle"></h1>

<p style="font-size:22px;margin-top:20px;">
🎂 Congratulations! 🎂
</p>

<button onclick="location.reload()">
Celebrate Another
</button>
</div>

</div>

<script>

function celebrate(){

let name=document.getElementById("name").value.trim();

if(name==""){
alert("Please enter a name.");
return;
}

document.getElementById("formSection").style.display="none";
document.getElementById("celebration").style.display="block";
document.getElementById("mainTitle").innerHTML="🎉 Happy Celebration, "+name+"! 🎉";

createNames(name);
createConfetti();
createBalloons();

}

function createNames(name){

setInterval(()=>{

let text=document.createElement("div");

text.className="bigName";

text.innerText="🎉 "+name+" 🎉";

text.style.left=Math.random()*100+"vw";

text.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(text);

setTimeout(()=>{
text.remove();
},9000);

},250);

}

function createBalloons(){

const colors=[
"#ff1744",
"#00e676",
"#2979ff",
"#ffea00",
"#ff6d00",
"#e040fb",
"#00e5ff"
];

setInterval(()=>{

let balloon=document.createElement("div");

balloon.className="balloon";

balloon.style.left=Math.random()*100+"vw";

balloon.style.setProperty("--color",colors[Math.floor(Math.random()*colors.length)]);

balloon.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(balloon);

setTimeout(()=>{
balloon.remove();
},10000);

},300);

}

function createConfetti(){

const colors=["red","yellow","blue","green","pink","orange","purple","cyan"];

setInterval(()=>{

for(let i=0;i<15;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background=colors[Math.floor(Math.random()*colors.length)];

c.style.animationDuration=(2+Math.random()*3)+"s";

document.body.appendChild(c);

setTimeout(()=>{
c.remove();
},5000);

}

},300);

}

</script>

</body>
</html>
